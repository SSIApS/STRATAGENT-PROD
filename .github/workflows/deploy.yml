name: Deploy STRATAGENT to Cloud Run

on:
  workflow_dispatch:  # Manual trigger only — auto-deploy disabled until Block 4 WIF setup complete
    inputs:
      confirm:
        description: 'Type DEPLOY to confirm'
        required: true

env:
  PROJECT_ID: gen-lang-client-0933865033
  REGION: europe-west2
  SERVICE_NAME: stratagent-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push container
        run: |
          gcloud builds submit ./backend \
            --tag gcr.io/$PROJECT_ID/$SERVICE_NAME \
            --project $PROJECT_ID

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image gcr.io/$PROJECT_ID/$SERVICE_NAME \
            --platform managed \
            --region $REGION \
            --allow-unauthenticated \
            --set-secrets STRATAGENT_GEMINI_API_KEY=STRATAGENT_GEMINI_API_KEY:latest \
            --project $PROJECT_ID
